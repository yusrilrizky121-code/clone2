name: auspoty
description: Auspoty - Music Streaming App
publish_to: 'none'

version: 8.4.0+18

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.2.5
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  http: ^1.2.1
  just_audio: ^0.9.40
  workmanager: ^0.6.0
  image_picker: ^1.1.2
  open_filex: ^4.3.4
  # Pin package_info_plus ke versi yang kompatibel dengan Kotlin 1.9.x
  package_info_plus: ">=8.0.0 <9.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/web/
