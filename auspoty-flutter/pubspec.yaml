name: auspoty
description: Auspoty - Music Streaming App
publish_to: 'none'

version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  flutter_local_notifications: ^17.0.0
  audio_service: ^0.18.13
  just_audio: ^0.9.36
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  wakelock_plus: ^1.2.5
  path_provider: ^2.1.3
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/web/
