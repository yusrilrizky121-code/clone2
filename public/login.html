<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Auspoty</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .logo { font-size: 32px; font-weight: 700; color: #a78bfa; letter-spacing: 2px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 14px; }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google img { width: 20px; height: 20px; }
    .status { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; padding: 0 20px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(167,139,250,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">Auspoty</div>
  <div class="subtitle">Login dengan akun Google kamu</div>
  <button class="btn-google" id="btnLogin" onclick="doLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Masuk dengan Google
  </button>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAYJEVXTS17vEX4J6_ymevMiJUnWV-Xf8Q",
      authDomain: "auspoty-web.firebaseapp.com",
      projectId: "auspoty-web",
      storageBucket: "auspoty-web.firebasestorage.app",
      messagingSenderId: "355662875368",
      appId: "1:355662875368:web:2057b213f4b7794aae175d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    const statusEl = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const btn = document.getElementById('btnLogin');

    function redirectWithUser(user) {
      const userData = {
        name: user.displayName || 'Pengguna Google',
        email: user.email || '',
        picture: user.photoURL || '',
        sub: user.uid || '',
      };
      const encoded = encodeURIComponent(JSON.stringify(userData));
      // Redirect ke halaman utama — WebView onLoadStop akan inject userData ke localStorage
      window.location.replace('/?userData=' + encoded);
    }

    // Cek redirect result dulu (setelah signInWithRedirect kembali)
    spinner.style.display = 'block';
    btn.style.display = 'none';
    statusEl.textContent = 'Memeriksa sesi...';

    getRedirectResult(auth).then((result) => {
      if (result && result.user) {
        statusEl.textContent = 'Login berhasil! Kembali ke app...';
        redirectWithUser(result.user);
      } else {
        // Tidak ada redirect result — tampilkan tombol login
        spinner.style.display = 'none';
        btn.style.display = 'flex';
        statusEl.textContent = '';
      }
    }).catch((e) => {
      console.error('redirect result error:', e);
      spinner.style.display = 'none';
      btn.style.display = 'flex';
      statusEl.textContent = '';
    });

    window.doLogin = async function() {
      btn.style.display = 'none';
      spinner.style.display = 'block';
      statusEl.textContent = 'Membuka akun Google...';

      try {
        // Coba popup dulu
        const result = await signInWithPopup(auth, provider);
        statusEl.textContent = 'Login berhasil! Kembali ke app...';
        redirectWithUser(result.user);
      } catch(e) {
        const blocked = ['auth/popup-blocked', 'auth/popup-closed-by-user',
                         'auth/cancelled-popup-request', 'auth/operation-not-supported-in-this-environment'];
        if (blocked.includes(e.code)) {
          // Popup diblokir di WebView — gunakan Custom Tab via flutter_inappwebview
          statusEl.textContent = 'Membuka browser Google...';
          try {
            // Buka Google login di browser eksternal, bukan redirect di WebView
            if (window.flutter_inappwebview) {
              // Kirim sinyal ke Dart untuk buka Chrome Custom Tab
              window.flutter_inappwebview.callHandler('openExternalLogin');
            } else {
              // Fallback: coba redirect biasa
              await signInWithRedirect(auth, provider);
            }
          } catch(e2) {
            spinner.style.display = 'none';
            btn.style.display = 'flex';
            statusEl.textContent = 'Login gagal: ' + (e2.message || e2.code || 'Coba lagi');
          }
        } else {
          spinner.style.display = 'none';
          btn.style.display = 'flex';
          statusEl.textContent = 'Login gagal: ' + (e.message || e.code || 'Coba lagi');
          console.error(e);
        }
      }
    };
  </script>
</body>
</html>
