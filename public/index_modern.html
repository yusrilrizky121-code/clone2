<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Auspoty - Music & Lyrics</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/174/174872.png">
    <link rel="stylesheet" href="/style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- Firebase (unchanged - no config changes) -->
    <script type="module">
        // [Existing Firebase code - preserved exactly]
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        // ... (all existing Firebase auth/firestore code remains identical)
    </script>
</head>
<body class="fade-in">

<!-- ✨ MODERN AUTH SCREEN - One-tap Google + minimal fallback -->
<div id="authScreen" class="auth-modern fade-in-300">
    <div class="auth-hero">
        <!-- Floating orb animation -->
        <div class="orb-container">
            <div class="orb-glow"></div>
            <div class="orb-core">
                <svg viewBox="0 0 72 72" class="orb-icon">
                    <path d="M36 6v31.65c-1.77-1.02-3.85-1.65-6-1.65-6.63 0-12 5.37-12 12s5.37 12 12 12 12-5.37 12-12V21h12V6h-18z"/>
                </svg>
            </div>
        </div>
        
        <h1 class="hero-title gradient-text">Auspoty</h1>
        <p class="hero-subtitle">Your music, perfectly in sync ✨</p>
    </div>

    <!-- Enhanced auth card -->
    <div class="auth-card">
        <!-- One-Tap Google (priority #1) -->
        <button class="btn-google-modern" onclick="doGoogleAuth()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <!-- Google SVG paths -->
            </svg>
            <span>Continue with Google</span>
            <div class="btn-shimmer"></div>
        </button>

        <!-- Progressive disclosure for email forms -->
        <div class="auth-toggle" id="authToggle">
            <div class="divider-or">or use email</div>
            
            <!-- Modern forms with skeleton states -->
            <div id="formLogin" class="auth-form skeleton-shim">
                <div class="form-group">
                    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
                    <label>Email</label>
                </div>
                <div class="form-group">
                    <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
                    <label>Password</label>
                </div>
                <button id="btnLogin" onclick="doLogin()">Sign In</button>
            </div>

            <div id="formRegister" class="auth-form" style="display:none;">
                <div class="form-group">
                    <input id="regName" type="text" placeholder="Full name" autocomplete="name">
                    <label>Full Name</label>
                </div>
                <div class="form-group">
                    <input id="regEmail" type="email" placeholder="Email" autocomplete="email">
                    <label>Email</label>
                </div>
                <div class="form-group">
                    <input id="regPassword" type="password" placeholder="Password (6+ chars)" autocomplete="new-password">
                    <label>Password</label>
                </div>
                <button id="btnRegister" onclick="doRegister()">Create Account</button>
            </div>
            
            <!-- Smooth tab switcher -->
            <div class="tab-switcher-modern">
                <button class="tab-btn active" data-tab="login" onclick="authSwitchTab('login')">Sign In</button>
                <button class="tab-btn" data-tab="register" onclick="authSwitchTab('register')">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="authError" class="error-modern"></div>
</div>

<!-- ✨ MODERN DASHBOARD - Hero sections + shimmer -->
<div id="view-home" class="view-section active">
    <div class="dashboard-modern">
        <!-- Floating header with search -->
        <div class="dash-header">
            <div class="user-avatar-stack">
                <div class="avatar-primary" id="dashAvatar">A</div>
            </div>
            <div class="hero-title-stack">
                <h1 class="hero-main">Good Morning</h1>
                <p class="hero-sub">58 songs • 2h 47m today</p>
            </div>
            <div class="search-modern-container">
                <input class="search-modern" id="globalSearch" placeholder="Search for songs, artists...">
            </div>
        </div>

        <!-- Pills with micro-interactions -->
        <div class="pills-modern" id="homePills">
            <button class="pill-modern active" data-filter="all">All</button>
            <button class="pill-modern" data-filter="trending">Trending</button>
            <button class="pill-modern" data-filter="new">New</button>
        </div>

        <!-- Shimmer sections -->
        <div class="hero-section shimmer-container" id="heroRecent">
            <h2 class="section-hero">Continue Listening</h2>
            <div class="grid-modern" id="recentGrid"></div>
        </div>
        
        <div class="hero-section" id="heroCharts">
            <h2 class="section-hero">Top Charts</h2>
            <div class="carousel-modern" id="chartsCarousel"></div>
        </div>
    </div>
</div>

<!-- ✨ MODERN SEARCH - Instant results + categories -->
<div id="view-search" class="view-section">
    <div class="search-hero">
        <div class="search-input-modern">
            <svg class="search-icon" viewBox="0 0 24 24">
                <!-- search icon -->
            </svg>
            <input id="searchInput" class="search-field-modern" placeholder="What do you want to listen to? 🎵">
            <button class="search-mic" onclick="voiceSearch()">🎤</button>
        </div>
        
        <!-- Instant results -->
        <div id="searchInstant" class="instant-results"></div>
        
        <!-- Modern categories -->
        <div class="categories-modern">
            <h3 class="cat-title">Quick Picks</h3>
            <div class="cat-grid" id="categoryGrid"></div>
        </div>
    </div>
    
    <div id="searchResultsUI" class="results-modern" style="display:none;">
        <div class="results-header">
            <span id="resultsCount">0 results</span>
            <button class="filter-btn">Filters</button>
        </div>
        <div id="searchResults" class="list-virtual"></div>
    </div>
</div>

<!-- ✨ COMMENTS - Threaded with reactions -->
<div id="commentsModal" class="modal-modern">
    <div class="modal-header-modern">
        <button class="back-modern" onclick="closeCommentsModal()">←</button>
        <h2 id="commentTrackName" class="modal-title">Song Title - Artist</h2>
        <div class="modal-actions">
            <button class="emoji-picker" onclick="openEmojiPicker()">😊</button>
            <button class="close-modal" onclick="closeCommentsModal()">✕</button>
        </div>
    </div>
    
    <!-- Threaded comments container -->
    <div id="commentsThreads" class="comments-threads"></div>
    
    <!-- Input with reactions -->
    <div id="commentComposer" class="composer-modern">
        <div class="composer-input">
            <div class="avatar-small" id="composerAvatar"></div>
            <textarea id="commentInput" placeholder="Write a comment..."></textarea>
        </div>
        <div class="composer-actions">
            <button class="reaction-btn" onclick="showReactions()">😍</button>
            <button class="send-btn" onclick="submitComment()">Send</button>
        </div>
    </div>
</div>

<!-- ✨ MODERN PLAYER - Queue + lyrics overlay -->
<div id="playerModal" class="player-modern">
    <!-- Visualizer background -->
    <div class="player-bg-viz" id="playerViz">
        <canvas class="viz-canvas"></canvas>
    </div>
    
    <div class="player-stack">
        <!-- Track info -->
        <div class="player-hero">
            <div class="album-modern" id="playerArtWrapper">
                <img id="playerArt" alt="Album Art">
                <div class="album-glow"></div>
            </div>
            <div class="track-modern">
                <h2 id="playerTitle" class="track-title">Song Title</h2>
                <p id="playerArtist" class="track-artist">Artist</p>
                <div class="track-actions">
                    <button class="action-btn" id="btnLike" onclick="toggleLike()">❤️</button>
                    <button class="action-btn" onclick="downloadMusic()">⬇️</button>
                    <button class="action-btn" onclick="openLyricsOverlay()">📝</button>
                </div>
            </div>
        </div>
        
        <!-- Enhanced seekbar with waveform -->
        <div class="seekbar-modern">
            <div class="waveform-container" id="waveformViz">
                <!-- Dynamic waveform bars -->
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
        
        <!-- Controls + queue -->
        <div class="player-controls">
            <div class="controls-main">
                <button class="ctrl repeat" id="btnRepeat">🔁</button>
                <button class="ctrl skip" onclick="playPrevSong()">⏮</button>
                <button class="ctrl play" id="mainPlayBtn" onclick="togglePlay()">▶️</button>
                <button class="ctrl skip" onclick="playNextSong()">⏭</button>
                <button class="ctrl comments" onclick="openCommentsModal()">💬</button>
            </div>
            
            <!-- Queue preview -->
            <div class="queue-preview">
                <div class="queue-header">
                    <span>Next Up</span>
                    <button onclick="openFullQueue()">List</button>
                </div>
                <div id="queueNext" class="queue-tracks"></div>
            </div>
        </div>
    </div>
</div>

<!-- View transitions overlay -->
<div id="viewTransition" class="transition-overlay"></div>

<!-- Loading skeletons -->
<div class="skeleton-modern" style="display:none;" id="skeletonLoader">
    <!-- Shimmer cards for dashboard -->
</div>

<!-- Script (will enhance next) -->
<script src="/script.js"></script>

</body>
</html>
